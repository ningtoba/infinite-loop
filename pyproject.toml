[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "hermes-loop"
description = "Autonomous loop daemon that spawns Hermes sessions with real tools and delegation"
version = "14.35.0"
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"

[project.scripts]
hermes_loop = "hermes_loop.cli:main"
hermes_loop_web = "web_app.server:main"

[project.optional-dependencies]
web = ["fastapi>=0.100.0", "uvicorn>=0.23.0", "python-dotenv>=1.0.0"]

[tool.setuptools.packages.find]
include = ["hermes_loop*"]
