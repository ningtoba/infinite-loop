services:
  hermes-loop:
    build: .
    container_name: hermes-loop
    # Host network + PID namespace — the container uses nsenter to run
    # hermes directly on the host, so it has full access to the host's
    # PATH, home directory, config files, API keys, and env vars.
    network_mode: host
    pid: host
    privileged: true
    environment:
      - WEB_PORT=8090
      - INFINITE_LOOP_WORKDIR=/workdir
    volumes:
      # Mount the work directory (your target project)
      - ${INFINITE_LOOP_WORKDIR:-/tmp}:/workdir
      # Persist ledger data + config JSON across container restarts
      - hermes-loop-data:/tmp
    restart: unless-stopped
    # Config is managed entirely through the web UI (JSON in /tmp).
    # Hermes runs on the host via nsenter — no binary mount needed.
    tty: true
    stdin_open: true

volumes:
  hermes-loop-data:
    name: hermes-loop-data
