name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Verify lock file up to date
        run: make verify-lock

      - name: Run lint
        run: make lint-all

  coverage:
    runs-on: ubuntu-latest
    needs: test
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Download coverage data
        uses: actions/download-artifact@v4
        with:
          pattern: coverage-data-*
          path: coverage-artifacts

      - name: Combine coverage data from all Python versions
        run: |
          coverage combine coverage-artifacts/
          coverage xml -o coverage.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          fail_ci_if_error: false
          verbose: true

      - name: Check coverage threshold
        if: always()
        run: |
          if [ -f coverage.xml ]; then
            # Extract total line-rate from Cobertura XML
            RATE=$(python3 -c "import xml.etree.ElementTree as ET; t = ET.parse('coverage.xml').getroot(); print(t.get('line-rate'))")
            PCT=$(python3 -c "print(f'{float(\"$RATE\") * 100:.1f}')")
            echo "Total line coverage: $PCT%"
            THRESHOLD=65.0
            if (( $(echo "$PCT < $THRESHOLD" | bc -l) )); then
              echo "::warning::Coverage $PCT% is below threshold $THRESHOLD%"
            else
              echo "Coverage is above $THRESHOLD% — all good!"
            fi
          else
            echo "::warning::No coverage.xml found — coverage could not be measured"
          fi

  security:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run security scanning
        run: make security

      - name: Upload bandit report
        uses: actions/upload-artifact@v4
        with:
          name: bandit-report
          path: bandit-report.json

  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    continue-on-error: ${{ matrix.python-version == '3.13' }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install -e .

      - name: Run tests
        run: make test-ci

      - name: Upload coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-data-${{ matrix.python-version }}
          path: .coverage
          if-no-files-found: ignore
