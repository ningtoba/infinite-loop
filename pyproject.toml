[build-system]
requires = ["setuptools>=64"]
build-backend = "setuptools.build_meta"

[project]
name = "hermes-loop"
description = "Autonomous loop daemon that spawns Hermes sessions with real tools and delegation"
version = "14.38.0"
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.10"

[project.scripts]
hermes_loop = "hermes_loop.cli:main"
hermes_loop_web = "web_app.server:main"

[project.optional-dependencies]
web = ["fastapi>=0.100.0", "uvicorn>=0.23.0", "python-dotenv>=1.0.0"]

[tool.setuptools.packages.find]
include = ["hermes_loop*", "web_app*"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
python_classes = ["Test*"]
python_functions = ["test_*"]
filterwarnings = ["ignore::DeprecationWarning"]

[tool.coverage.run]
source = ["hermes_loop", "web_app"]
omit = ["*/tests/*"]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "if __name__ == .__main__.:",
    "if TYPE_CHECKING:",
]
